<!DOCTYPE html>
<html>
<head>
    <title>PhishShield AI</title>
</head>
<body>

<h2>PhishShield AI 🔐</h2>

<textarea id="inputText" rows="5" cols="50" placeholder="Paste suspicious message here"></textarea><br><br>

<button onclick="checkPhishing()">Check Message</button>

<h3 id="result"></h3>
<ul id="reasons"></ul>

<script>
function checkPhishing() {
    let message = document.getElementById("inputText").value.toLowerCase();

    let risk = "LOW";
    let reasons = [];

    let suspiciousWords = ["urgent", "bank", "password", "otp", "click", "verify"];

    suspiciousWords.forEach(word => {
        if (message.includes(word)) {
            risk = "HIGH";
            reasons.push("Contains suspicious word: " + word);
        }
    });

    if (message.includes("http") || message.includes("www")) {
        risk = "HIGH";
        reasons.push("Contains a suspicious link");
    }

    document.getElementById("result").innerText = "Risk Level: " + risk;

    let list = document.getElementById("reasons");
    list.innerHTML = "";

    reasons.forEach(r => {
        let li = document.createElement("li");
        li.innerText = r;
        list.appendChild(li);
    });
}
</script>

</body>
</html>

<script>
function checkPhishing() {
    let message = document.getElementById("inputText").value.toLowerCase();

    let risk = "LOW";
    let reasons = [];
    let explanation = "";

    let suspiciousWords = ["urgent", "bank", "password", "otp", "click", "verify"];

    suspiciousWords.forEach(word => {
        if (message.includes(word)) {
            risk = "HIGH";
            reasons.push("Suspicious keyword detected: " + word);
        }
    });

    if (message.includes("http") || message.includes("www")) {
        risk = "HIGH";
        reasons.push("Suspicious link detected");
    }

    // AI-style explanation
    if (risk === "HIGH") {
        explanation = "This message shows patterns commonly used in phishing attacks such as urgency, financial terms, or suspicious links. Users should avoid clicking links or sharing sensitive data.";
    } else {
        explanation = "This message does not contain strong phishing indicators, but always stay cautious while sharing personal information.";
    }

    document.getElementById("result").innerText = "Risk Level: " + risk;

    let list = document.getElementById("reasons");
    list.innerHTML = "";

    reasons.forEach(r => {
        let li = document.createElement("li");
        li.innerText = r;
        list.appendChild(li);
    });

    // Show explanation
    let exp = document.getElementById("explanation");
    if (!exp) {
        let newExp = document.createElement("p");
        newExp.id = "explanation";
        document.body.appendChild(newExp);
        exp = newExp;
    }

    exp.innerText = "AI Explanation: " + explanation;
}
</script>
